<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#efe7dc"/>
  <!-- Shadow -->
  <ellipse cx="400" cy="480" rx="200" ry="16" fill="#2d2925" opacity="0.12"/>
  <!-- Wallet back panel (slightly offset) -->
  <rect x="196" y="172" width="296" height="286" rx="14" fill="#8f5221"/>
  <!-- Wallet front panel -->
  <rect x="206" y="162" width="296" height="286" rx="14" fill="#a7642c"/>
  <!-- Front panel surface sheen -->
  <rect x="214" y="168" width="280" height="100" rx="8" fill="#b87234" opacity="0.4"/>
  <!-- Card pocket (top section) -->
  <rect x="218" y="174" width="272" height="88" rx="8" fill="#8f5221"/>
  <!-- Card visible in pocket -->
  <rect x="226" y="182" width="160" height="72" rx="6" fill="#c4a882"/>
  <rect x="234" y="190" width="80" height="8" rx="3" fill="#d8c4a8" opacity="0.7"/>
  <rect x="234" y="206" width="56" height="6" rx="2" fill="#d8c4a8" opacity="0.5"/>
  <rect x="234" y="220" width="40" height="6" rx="2" fill="#d8c4a8" opacity="0.5"/>
  <!-- Second card sticking out -->
  <rect x="300" y="178" width="160" height="72" rx="6" fill="#b07848"/>
  <!-- Divider line -->
  <line x1="218" y1="272" x2="490" y2="272" stroke="#8f5221" stroke-width="2"/>
  <!-- Bill compartment fold lines -->
  <rect x="218" y="280" width="272" height="148" rx="4" fill="#9a5e24" opacity="0.3"/>
  <line x1="218" y1="332" x2="490" y2="332" stroke="#8f5221" stroke-width="1.5" opacity="0.6"/>
  <line x1="218" y1="382" x2="490" y2="382" stroke="#8f5221" stroke-width="1.5" opacity="0.6"/>
  <!-- Snap button or logo area -->
  <circle cx="354" cy="430" r="10" fill="#8f5221"/>
  <circle cx="354" cy="430" r="6" fill="#6b3510"/>
  <!-- Stitching around edge -->
  <rect x="216" y="170" width="272" height="270" rx="12" fill="none" stroke="#d8c2aa" stroke-width="1.5" stroke-dasharray="6,5"/>
  <!-- Spine (right edge thickness) -->
  <path d="M502 162 Q516 162 516 176 L516 434 Q516 448 502 448 L502 162Z" fill="#8f5221"/>
</svg>
